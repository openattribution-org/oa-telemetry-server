app = "oa-telemetry-server"
primary_region = "iad"

[build]
  dockerfile = "Containerfile"

[env]
  PORT = "8007"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8007
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
